services:
  - type: web
    name: video-app
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: node dist/server.cjs
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: 3000
      - key: RENDER_DISK_MOUNT_PATH
        value: /opt/render/project/src/downloads_persistent
    disks:
      - name: downloads-data
        mountPath: /opt/render/project/src/downloads_persistent
        sizeGB: 1
